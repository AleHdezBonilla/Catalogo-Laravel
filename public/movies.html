<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.5. Funciones de visualización, creación y eliminación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 
</head>

<body class="container py-4">
    <div>
        <h1>3.5. Funciones de visualización, creación y eliminación</h1>
        <h2>Unidad 3. Frontend Angular y Bootstrap</h2>
        <h3>Conceptualización de entornos de desarrollo de aplicaciones y servicios</h3>
    </div>



    <div class="mb-3">
        <button onclick="Agregar()" class="btn btn-primary mb-3">Agregar película</button>
        <hr>
        <div id="myDIV" style="display:none;" class="card p-4 mb-4" >
            <h2 id="form-title">Agregar nueva película</h2>
            <form id="add-movie-form">
                <input class="form-control" type="hidden" id="movie-id">
                <input class="form-control" type="text" id="title" placeholder="Título" required><br><br>
                <textarea class="form-control" id="synopsis" placeholder="Sinopsis" required></textarea><br><br>
                <input class="form-control" type="number" id="year" placeholder="Año" required><br><br>
                <input class="form-control" type="text" id="cover" placeholder="URL de portada" required><br><br>
                <button type="submit">Guardar película</button>
            </form>
        </div>
    </div>

    <h1>Catálogo de Películas</h1>
    <table class="table table-bordered table-striped table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Sinopsis</th>
                <th>Año</th>
                <th>Portada</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="movies-table-body"></tbody>
    </table>


</body>

<script>
    function cargarMovies() {
        fetch('http://127.0.0.1:8000/api/movies')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('movies-table-body');
                tbody.innerHTML = '';

                data.forEach(movie => {
                    console.log(movie);
                    tbody.innerHTML += `
                            <tr>
                                <td>${movie.id}</td>
                                <td>${movie.title}</td>
                                <td>${movie.synopsis}</td>
                                <td>${movie.year}</td>
                                <td><img src="${movie.cover}" width="80"></td>
                                <td>
                                    <button class="btn btn-warning btn-sm" onclick="editMovie(${movie.id})">Editar</button>
                                </td>
                            </tr>
                        `;
                });
            });
    }

    function guardarMovie(e) {
        e.preventDefault();

        const movieId = document.getElementById('movie-id').value;

        const movie = {
            title: document.getElementById('title').value,
            synopsis: document.getElementById('synopsis').value,
            year: parseInt(document.getElementById('year').value),
            cover: document.getElementById('cover').value
        };

        const url = movieId
            ? `http://127.0.0.1:8000/api/movies/${movieId}`
            : 'http://127.0.0.1:8000/api/movies';

        const method = movieId ? 'PUT' : 'POST';

        console.log('Método:', method);
        console.log('URL:', url);

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(movie)
        })
            .then(response => response.json())
            .then(data => {
                console.log(data);

                document.getElementById('add-movie-form').reset();
                document.getElementById('movie-id').value = '';
                document.getElementById('form-title').innerText = '➕ Agregar nueva película';

                cargarMovies();
            })
            .catch(error => console.error('Error:', error));
    }

    document.getElementById('add-movie-form')
        .addEventListener('submit', guardarMovie);


    function editMovie(id) {
        console.log('ID recibido:', id);

        fetch(`http://127.0.0.1:8000/api/movies/${id}`)
            .then(response => response.json())
            .then(movie => {
                document.getElementById('movie-id').value = movie.id;
                document.getElementById('title').value = movie.title;
                document.getElementById('synopsis').value = movie.synopsis;
                document.getElementById('year').value = movie.year;
                document.getElementById('cover').value = movie.cover;

                document.getElementById('form-title').innerText = 'Editar película';

                document.getElementById('myDIV').style.display = 'block';
            });
    }

    cargarMovies();

    function Agregar() {
        var x = document.getElementById("myDIV");
        if (x.style.display === "none") {
            x.style.display = "block";

        } else {
            x.style.display = "none";

        }
    }
    
</script>

</html>
